<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Coach | Planner</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">Study Coach</a>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/planner.html">Planner</a>
            <a href="/progress.html">Progress</a>
            <a href="/focus.html">Focus</a>
            <a href="/timer.html">Timer</a>
            <a href="/profile.html">Profile</a>
        </div>
    </nav>

    <main class="container page-content">
        <div class="card center-card max-w-600">
            <h2 class="text-center mb-2">Study Planner</h2>
            <p class="text-light text-center mb-2">Create a customized, step-by-step topic breakdown tailored to your exam timeline.</p>
            
            <form id="plannerForm">
                <label class="block mb-1 font-medium">Select Subject</label>
                <select id="subjectSelect" required>
                    <option value="" disabled selected>-- Choose a Subject --</option>
                    <!-- Options injected via JS -->
                </select>

                <label class="block mb-1 mt-1 font-medium">Number of days until exam</label>
                <input type="number" id="daysInput" placeholder="e.g. 10" min="1" max="90" required>
                
                <button type="submit" style="width: 100%" class="mt-1">Generate Plan</button>
            </form>

            <div id="planOutput">
                <!-- Plan items will appear here -->
            </div>
        </div>
    </main>
</body>
</html>

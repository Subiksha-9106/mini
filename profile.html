<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Coach | Profile</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <a href="/index.html" class="logo">Study Coach</a>
        <div class="nav-links">
            <a href="/index.html">Home</a>
            <a href="/planner.html">Planner</a>
            <a href="/progress.html">Progress</a>
            <a href="/focus.html">Focus</a>
            <a href="/timer.html">Timer</a>
            <a href="/profile.html">Profile</a>
        </div>
    </nav>

    <main class="container page-content">
        <div class="card center-card max-w-600">
            <h2 class="mb-2">Your Profile</h2>
            
            <form id="profileForm">
                <div class="mb-2">
                    <label class="block mb-1 font-medium">Name</label>
                    <input type="text" id="profName" required>
                </div>
                
                <div class="mb-2">
                    <label class="block mb-1 font-medium">Email</label>
                    <input type="email" id="profEmail" required>
                </div>

                <div class="divider"></div>
                <h3 class="mb-1">Settings</h3>

                <div class="flex-between mb-1">
                    <span class="font-medium">App Theme</span>
                    <select id="themeSelect" style="width: auto; margin-bottom: 0;">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="system">System</option>
                    </select>
                </div>

                <div class="flex-between mb-2 mt-1">
                    <span class="font-medium">Notifications</span>
                    <label class="switch">
                        <input type="checkbox" id="notifToggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>

                <button type="submit" style="width: 100%">Save Changes</button>
            </form>
        </div>
    </main>
</body>
</html>
